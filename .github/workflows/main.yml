# .github/workflows/build_armv7.yml
name: Build ARMv7 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # اجرای دستی

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK (command-line tools)
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platforms;android-24"

      - name: Setup Gradle (temporary installation for wrapper generation)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7   # نسخه‌ای که با Kotlin 1.9+ سازگار است

      - name: Generate Gradle Wrapper (if missing)
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7
            chmod +x gradlew
          else
            chmod +x gradlew
          fi

      - name: Force armeabi-v7a ABI only
        run: |
          sed -i "/defaultConfig {/a \        ndk { abiFilters 'armeabi-v7a' }" app/build.gradle

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultra-game-booster-armv7-debug
          path: app/build/outputs/apk/debug/app-debug.apk
