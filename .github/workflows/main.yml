# .github/workflows/build_armv7.yml
name: Build ARMv7 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # امکان اجرای دستی از تب Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0
            platforms;android-24

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Force armeabi-v7a ABI only
        run: |
          # این دستور بعد از خط defaultConfig { بلوک ndk را اضافه می‌کند
          sed -i "/defaultConfig {/a \        ndk { abiFilters 'armeabi-v7a' }" app/build.gradle

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultra-game-booster-armv7-debug
          path: app/build/outputs/apk/debug/app-debug.apk
