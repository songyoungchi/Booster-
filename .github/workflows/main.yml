# .github/workflows/build_armv7.yml
name: Build ARMv7 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK (command-line tools only)
        uses: android-actions/setup-android@v3
        # بسته را اینجا نمی‌دهیم تا خطا ندهد
        # packages رو می‌تونیم خالی بگذاریم

      - name: Install required SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platforms;android-24"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Force armeabi-v7a ABI only
        run: |
          sed -i "/defaultConfig {/a \        ndk { abiFilters 'armeabi-v7a' }" app/build.gradle

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultra-game-booster-armv7-debug
          path: app/build/outputs/apk/debug/app-debug.apk
